backend:
  name: git-gateway
  branch: main
local_backend: true
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "architectural-grilles"
    label: "Architectural Grilles"
    folder: "content/products/architectural-grilles"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Slug", name: "slug", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Material", name: "material", widget: "string"}
      - {label: "Dimensions", name: "dimensions", widget: "string"}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Category", name: "category", widget: "hidden", default: "architectural-grilles"}

