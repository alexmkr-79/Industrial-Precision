kind = "web"
previewPath = "/"
title = "Rachnakar Design Studio"
version = "1.0.0"
id = "artifacts/rachnakar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19043

[services.development]
run = "pnpm --filter @workspace/rachnakar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rachnakar", "run", "build" ]
publicDir = "artifacts/rachnakar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19043"
BASE_PATH = "/"
